heading: O firmie
content: >-
  Zajmujemy się profesjonalnym spawaniem i produkcją mebli w stylu loftowym.
  Łączymy solidne rzemiosło z nowoczesnym designem, tworząc unikalne produkty
  na zamówienie. Specjalizujemy się w spawaniu MIG/MAG i TIG. Każdy projekt
  traktujemy indywidualnie — od konsultacji, przez projekt, po realizację i
  montaż. Stawiamy na jakość materiałów, precyzję wykonania i terminowość.
